        \ and emits structured events to Redis for downstream systems to react to\
        \ state changes.\n- The `service:fileops` ensures that file operations are\
        \ only permitted during `EXECUTING` and `EVOLVING` states, using Redis locks\
        \ to prevent race conditions.\n- The `module:skills` manages skill evolution\
        \ by interacting with the Chroma vector database, which is accessed via the\
