        \ A user/agent triggers a task.\n2.  **Routing:** The system evaluates the\
        \ task complexity and routes it through the hierarchy (e.g., *Mikado* $\\\
        rightarrow$ *Toneri* $\\rightarrow$ *Onmyoji*).\n3.  **Augmentation:** Before\
        \ execution, the system queries **ChromaDB** to inject relevant \"Skills\"\
        \ (successful past patterns) into the LLM prompt.\n4.  **Execution:** An agent\
        \ performs the task via the **Executor**, constrained by the `safe_write`\
        \ sandbox.\n5.  **Completion/Failure:** The state is updated in **Redis**,\
        \ and the event is broadcast via **Redis Streams**.\n\n#### B. The Learning\
        \ Loop (Skill Evolution)\nThis is the system's most unique feature, transforming\
        \ transient execution into permanent capability:\n*   **Trigger:** A task\
        \ reaches a `COMPLETED` state with high confidence.\n*   **Extraction:** An\
        \ agent analyzes the successful execution trace.\n*   **Vectorization:** The\
        \ pattern is converted into a \"Skill\" (Prompt Template + Metadata) and stored\
        \ in **ChromaDB**.\n*   **Retrieval:** Future tasks with similar semantic\
        \ embeddings trigger the retrieval of this skill, bypassing the need for \"\
        re-learning\" the same logic.\n\n### 4. Strict Constraints & Safety Boundaries\n\
        \nTo ensure system stability and security, the following constraints are enforced:\n\
        \n*   **The Sandbox Constraint:** All file I/O must pass through the `safe_write`\
        \ module. Any attempt to access paths outside of `/project/` or `/logs/` must\
        \ trigger an immediate security exception.\n*   **The Concurrency Constraint:**\
        \ To prevent data corruption in the shared file system, the **Redis Distributed\
        \ Lock** mechanism must be acquired before any agent modifies a file.\n* \
        \  **The Hierarchy Constraint:** Agents cannot \"skip\" levels of command\
        \ unless explicitly authorized by a system-level override. A *Toneri* cannot\
        \ directly command an *Onmyoji* without a routed event.\n*   **The Data Integrity\
        \ Constraint:** The **Redis State** is the \"Source of Truth\" for active\
        \ operations, while **YAML/Logs** are the \"Source of Truth\" for historical\
        \ audits. Discrepancies between these two must trigger a system alert.\n\n\
        ### 5. Potential Failure Modes & Mitigations\n\n| Failure Mode | Impact |\
        \ Mitigation Strategy |\n| :--- | :--- | :--- |\n| **Agent Hallucination**\
        \ | Incorrect task routing or invalid tool usage. | Implement **Validator\
        \ Agents** (Onmyoji class) to verify output before state commitment. |\n|\
        \ **Redis Connection Loss** | Total system paralysis (loss of state/events).\
        \ | Implement local write-ahead logging (WAL) and automatic reconnection logic.\
        \ |\n| **Skill Drift** | Injected skills become irrelevant or harmful over\
        \ time. | Periodic \"Skill Pruning\" where low-retrieval or low-success skills\
        \ are archived. |\n| **Resource Exhaustion** | LLM API latency or high memory\
        \ usage. | Implement rate-limiting and priority queues based on Agent rank.\
        \ |\n\n```\n\n\n### sprint_2\n\n#### src/generated/sprint_2/bloom_taxonomy_routing_implementation/index.ts\n\
