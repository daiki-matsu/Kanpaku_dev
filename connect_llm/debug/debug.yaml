        \ are logged.\n- `EVOLVING`: Agent is learning new skills based on task outcomes.\n\
        \nTransitions between states are triggered by task execution events, system\
        \ commands, or external API calls. Access control is enforced at every transition\
        \ point, ensuring that only authorized users or systems can manipulate agent\
        \ states.\n\n## 2. Mermaid Diagrams\n\n```mermaid\nstateDiagram-v2\n    [*]\
        \ --> INIT\n    INIT --> READY\n    READY --> EXECUTING\n    EXECUTING -->\
        \ COMPLETED\n    EXECUTING --> FAILED\n    COMPLETED --> EVOLVING\n    FAILED\
        \ --> EVOLVING\n    EVOLVING --> READY\n    EVOLVING --> [*]\n```\n\nThis\
        \ diagram outlines the canonical state transitions of an agent within the\
        \ Kanpaku system. The agent begins in the `INIT` state, moves to `READY` after\
        \ initialization, and transitions to `EXECUTING` upon task assignment. After\
        \ execution, the agent can either reach `COMPLETED` or `FAILED`, both of which\
