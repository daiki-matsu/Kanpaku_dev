        \ monitored and secured to prevent unauthorized access or data tampering?\n\
        \n\n---\n\n### design:shared-domain-model (docs/detailed_design/shared_domain_model.md)\n\
        \n# Shared Domain Model\n\n## 1. Overview\n\nThe Shared Domain Model defines\
        \ the core data structures, business logic, and access boundaries that are\
        \ shared across the Kanpaku system's multi-tenant architecture. It establishes\
        \ canonical types for agents, tasks, projects, and skills, ensuring consistency\
        \ and reusability across services and modules. This model is foundational\
        \ to the system's RBAC, tenant isolation, and secure file operations, and\
        \ is directly implemented via Row-Level Security (RLS) policies on database\
        \ tables.\n\nAll entities within the model are designed to support the hierarchical\
        \ agent workflow, where Mikado, Kanpaku, Tonoben, Toneri, and Onmyoji agents\
        \ each play defined roles in task execution and skill evolution. The model\
        \ supports real-time dashboard updates and integrates with Redis for state\
        \ management, event streaming, and file locking.\n\nThe domain model is implemented\
        \ with the following constraints:\n- All data access is governed by RLS policies\
        \ on database tables to enforce tenant isolation.\n- Authentication is required\
        \ at the API level using tokens.\n- File operations are restricted to the\
        \ `/project/` directory and must use the `safe_write()` function with Redis-based\
        \ locking.\n- Tasks and agents are associated with a project folder and must\
        \ remain within its scope.\n- All system events are streamed to Redis via\
        \ `XADD events:stream` and logged in structured formats for auditing.\n\n\
        ## 2. Mermaid Diagrams\n\n```mermaid\ngraph TD\n    A[Agent] -->|has| B[Task]\n\
        \    A -->|belongs_to| C[Tenant]\n    B -->|uses| D[Skill]\n    D -->|stored_in|\
        \ E[Chroma Vector DB]\n    B -->|in_project| F[Project Folder]\n    F -->|uses|\
        \ G[safe_write()]\n    G -->|locks_with| H[Redis Lock]\n    C -->|owns| I[DB\
        \ Tables]\n    I -->|enforced_by| J[RLS Policies]\n```\n\nThis diagram illustrates\
        \ the canonical ownership and data flow within the shared domain model. The\
        \ `Agent` entity is associated with a `Tenant` and manages `Task` entities.\
        \ Tasks may use `Skill` entities, which are stored in the Chroma vector database.\
        \ All file operations are restricted to a `Project Folder` and use the `safe_write()`\
        \ function, which is protected by Redis locks. Tenant boundaries are enforced\
        \ via RLS policies on database tables.\n\n## 3. Ownership Boundaries\n\nThe\
        \ shared domain model is owned by the `module:auth` component, which is responsible\
        \ for enforcing authentication, RBAC, and tenant isolation. All entities within\
