      - "\n        あなたはシステム開発プロジェクトを指揮する優秀なマネージャーです。\n        与えられた「指示」を分析し、自律AIエージェントが実行可能な粒度のサブタスクに分解してください。\n\
        \n        指示: 明「明日の朝ごはんは何？」を英語、中国語、韓国語に訳して\n\n        【思考プロセス（必ずこの順序で思考すること）】\n\
        \        1. 指示の全体目標を正確に把握する。\n        2. 目標達成に必要な具体的な手順をステップ順に洗い出す。\n    \
        \    3. 各手順の依存関係（どのタスクが完了しないと次が始まらないか）を整理する。\n        4. 各手順に対し、以下の定義に従って適切な属性（bloom_level,\
        \ type, priority）を割り当てる。\n\n        【属性の定義】\n        * bloom_level (1〜6の整数):\n\
        \        1: 記憶 (検索する、一覧を出す)\n        2: 理解 (要約する、説明する)\n        3: 応用 (テンプレートに沿って作る)\n\
        \        4: 分析 (構造を調べる、原因を探る)\n        5: 評価 (比較する、判断する)\n        6: 創造 (設計する、新しく作る)\n\
        \        * priority (1〜100の整数):\n        1が最低、100が最高。標準的な優先度は50とする。\n    \
        \    * type (以下から選択):\n        research, review, analysis, planning, file_write,\
        \ file_read, file_edit, file_move, file_delete, code_execution, web_search,\
        \ communication, etc...\n\n        【出力フォーマット要件】\n        以下のYAML形式のリストのみを出力してください。例文に引っ張られないよう、goalとcommandには「今回の指示」に基づいた具体的な内容を記述すること。\n\
        \n        ```yaml\n        - step_id: \"step_1\"\n          depends_on: []\n\
        \          bloom_level: <1〜6の整数>\n          priority: <1〜100の整数>\n       \
        \   goal: \"<指示書に設定されたタスク全体の最終目標>\"\n          command: \"<エージェントが実行すべき具体的なアクション>\"\
        \n          type: \"<指定リストから選択>\"\n          target_agent: \"toneri_1\"\n\
        \        - step_id: \"step_2\"\n          depends_on: [\"step_1\"]\n     \
        \     bloom_level: <1〜6の整数>\n          # 以降、必要な手順の数だけ繰り返す\n        "
