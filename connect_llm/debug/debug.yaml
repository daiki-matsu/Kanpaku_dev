        \ How is the `safe_write()` function integrated with the Redis locking mechanism\
        \ to prevent race conditions in file operations?\n- What are the exact mechanisms\
        \ for identifying and removing low-performing skills from the Chroma vector\
        \ database?\n\n\n---\n\n### design:system-design (docs/design/system_design.md)\n\
        \n# System Design\n\n## 1. Overview\n\nThe Kanpaku system is an AI-driven\
        \ autonomous management platform designed to operate within a multi-tenant\
        \ environment. It features a hierarchical agent structure composed of Mikado,\
        \ Kanpaku, Tonoben, Toneri, and Onmyoji agents, each with defined roles and\
        \ capabilities. The system enforces strict tenant isolation, role-based access\
        \ control (RBAC), and secure file operations through sandboxed environments.\n\
        \nAll interactions with the system are authenticated and audited. The system\
        \ utilizes Redis for state management and event streaming, with YAML-based\
        \ history tracking and a vector database (Chroma) for skill self-evolution.\
        \ Task routing follows Bloom level logic, and agent behavior is governed by\
        \ defined workflows and status transitions. The system supports real-time\
        \ dashboard updates and integrates with a logging infrastructure that tracks\
        \ events, state changes, and task histories.\n\nSecurity and privacy constraints\
        \ are embedded throughout the design. Authentication is enforced at the API\
        \ level using tokens, and tenant isolation is implemented via Row-Level Security\
        \ (RLS) policies on database tables. File operations are restricted to the\
        \ `/project/` directory and executed through a `safe_write()` function with\
        \ Redis-based locking to prevent concurrency issues. All system events are\
        \ streamed to Redis and logged in structured formats for auditing and analysis.\n\
        \n## 2. Architecture\n\nThe system architecture is built around the following\
        \ core components:\n\n### Authentication and Authorization\n- All API endpoints\
        \ require valid authentication tokens.\n- RBAC is enforced at the API level\
        \ to restrict access to system resources.\n- Tenant isolation is implemented\
        \ using RLS policies on database tables, specifically targeting `db:rls_policies`.\n\
        - Access control ensures that users can only interact with resources within\
        \ their assigned tenant.\n\n### Task and Agent Management\n- Tasks are created,\
        \ assigned, and executed based on Bloom level routing rules.\n- Task status\
        \ transitions follow a defined flow: created → assigned → doing → reviewing\
        \ → completed/failed.\n- Agent status reflects its current role: idle, thinking,\
        \ working, error, retrying, or stopped.\n- Retry logic is implemented for\
        \ tasks with incrementing retry counts on timeout or failure.\n- Tasks are\
        \ associated with a specific project folder and restricted to file operations\
        \ within that scope.\n\n### Dashboard and Reporting\n- The Memorial to the\
        \ Throne dashboard displays real-time updates of task statuses.\n- Dashboard\
        \ sections include urgent issues, in-progress tasks, and completed tasks.\n\
        - Detailed task information, including agent assignments and status history,\
        \ is accessible.\n- Dashboard updates occur upon task completion or review\
        \ approval.\n\n### Skill Self-Evolution\n- Skills are registered only after\
        \ successful task completion with a score of 80 or higher.\n- Pattern extraction\
        \ from task outcomes is performed by Onmyoji agents.\n- Skills are stored\
        \ in the Chroma vector database with embeddings and metadata.\n- During task\
        \ creation or review rejection, the system searches for relevant skills and\
        \ injects them into prompts.\n- Skill evolution updates usage counts and success\
        \ rates, and removes low-performing skills periodically.\n\n### File Operations\n\
        - File operations are executed via a sandboxed `safe_write()` function.\n\
        - File access is restricted to the `/project/` directory.\n- Redis-based locking\
        \ (`lock:{filepath}`) prevents concurrent file operations.\n- Modifications\
        \ are logged in the system history.\n\n### Event Streaming and Logging\n-\
        \ All system events are streamed to Redis using `XADD events:stream`.\n- Agents\
        \ retrieve events from their inbox streams (`inbox:{agent_id}`) and process\
        \ them.\n- State changes are logged in `/logs/state.log` with timestamps.\n\
        - Event history is stored in `/history/events/` as YAML files.\n- Task history\
        \ is stored in `/history/tasks/` as YAML files.\n\n### Time Model Compliance\n\
        - Agent thinking states timeout after 300 seconds.\n- Task doing states timeout\
        \ after 120 seconds.\n- Heartbeat messages are sent every 30 seconds during\
        \ agent activity.\n- UI displays spinner-like messages such as \"Creating\
        \ letter...\" during agent thinking.\n\n## 3. Open Questions\n\n- How will\
        \ the system handle large-scale concurrent task execution without performance\
        \ degradation?\n- What are the specific mechanisms for validating and sanitizing\
        \ skill embeddings before storage in Chroma?\n- How is the system's resilience\
        \ to Redis failures ensured, particularly in event streaming and locking mechanisms?\n\
        - Are there defined thresholds for identifying and removing low-performing\
        \ skills from the vector database?\n- What are the exact mechanisms for enforcing\
        \ the `/project/` directory restriction in file operations?\n- How will the\
        \ system manage and scale the event stream and history storage as usage increases?\n\
        \n\n---\n\n### design:task-flow-diagram (docs/detailed_design/task_flow_diagram.md)\n\
        \n# Task Flow Diagram\n\n## 1. Overview\n\nThe Task Flow Diagram outlines\
        \ the sequence of operations and interactions that occur within the Kanpaku\
        \ system when managing tasks, agents, and skills in a multi-tenant environment.\
        \ It is designed to support secure, scalable, and consistent execution of\
        \ workflows, leveraging shared domain models, Redis for state management,\
        \ and database-level tenant isolation via Row-Level Security (RLS) policies.\
        \ The diagram reflects the canonical ownership of entities and data flows,\
        \ ensuring that each component in the system has a clearly defined role and\
        \ boundary.\n\nThe system supports the following core workflows:\n- Agent\
        \ lifecycle management within a project scope\n- Task assignment and execution\
        \ using skills from a Chroma vector database\n- File operations within a `/project/`\
        \ directory using `safe_write()` with Redis-based locking\n- Real-time event\
        \ streaming and logging for auditability and system observability\n\nAll interactions\
        \ are governed by authentication tokens and tenant boundaries enforced by\
        \ `module:auth`. The diagram ensures that the task flow aligns with system-level\
        \ constraints, including data access control, file integrity, and performance\
        \ thresholds.\n\n## 2. Mermaid Diagrams\n\n```mermaid\nsequenceDiagram\n \
        \   participant A as Agent\n    participant T as Task\n    participant S as\
        \ Skill\n    participant F as File Ops\n    participant R as Redis\n    participant\
        \ D as Database\n    participant E as Events Stream\n\n    A->>T: Assign Task\n\
        \    T->>S: Use Skill\n    S->>D: Retrieve from Chroma DB\n    A->>F: Perform\
        \ File Write\n    F->>R: Acquire Lock\n    F->>D: safe_write()\n    R->>E:\
        \ XADD events:stream\n    D->>E: Log State Change\n```\n\nThis sequence diagram\
        \ illustrates the canonical flow of a task execution in the Kanpaku system.\
        \ An `Agent` assigns a `Task` that utilizes a `Skill` retrieved from the Chroma\
        \ vector database. The task involves file operations (`safe_write()`) which\
        \ are protected by a Redis lock to prevent race conditions. All system events\
        \ are streamed to Redis via `XADD events:stream` and logged for auditing purposes.\
        \ The `Database` enforces tenant boundaries using RLS policies, and `Events\
        \ Stream` logs all state changes for observability.\n\n## 3. Ownership Boundaries\n\
        \nThe ownership of components in the task flow is clearly defined to ensure\
        \ consistency and prevent duplication:\n\n- The `Agent`, `Task`, `Skill`,\
        \ and `Project` entities are owned by `module:auth` and defined in the shared\
        \ domain model.\n- The `safe_write()` function and Redis locking mechanism\
        \ are implemented in `service:fileops`.\n- The Chroma vector database is managed\
        \ by `module:skills`, and access is provided via `service:vector_db`.\n- All\
        \ database tables are governed by RLS policies enforced by `module:auth`.\n\
        - The `Events Stream` and logging are handled by `service:events`, with access\
        \ control managed by `module:auth`.\n\nThese ownership boundaries ensure that\
        \ all modules interact with shared types and workflows through well-defined\
        \ interfaces, reducing the risk of drift and inconsistencies.\n\n## 4. Implementation\
        \ Implications\n\nThe task flow diagram has direct implications for system\
        \ implementation:\n\n- The `module:auth` is responsible for validating tokens,\
        \ enforcing RBAC, and managing tenant boundaries using RLS policies on `agents`,\
        \ `tasks`, `projects`, and `skills`.\n- The `service:fileops` module implements\
        \ `safe_write()` with Redis locking, ensuring that all file operations within\
        \ `/project/` are atomic and secure.\n- The `service:events` module streams\
        \ all system events to Redis using `XADD events:stream` and logs changes to\
        \ `/logs/state.log` for compliance and debugging.\n- The `module:skills` module\
        \ manages the Chroma vector database, where skills are stored with embeddings\
        \ and metadata, and retrieved during task execution.\n- All task execution\
        \ steps must be within the scope of a project folder and must not bypass the\
        \ defined security and access controls.\n\nThese implementation strategies\
        \ ensure that the task flow is secure, scalable, and aligned with system-level\
        \ constraints such as tenant isolation, data integrity, and auditability.\n\
        \n## 5. Open Questions\n\n- How are the performance thresholds for skill retrieval\
        \ from the Chroma vector database defined, and what are the SLA requirements\
        \ for response times?\n- What are the specific RLS policy implementations\
        \ for each database table, and how are they tested for concurrent access scenarios?\n\
        - How is the Redis locking mechanism integrated with the `safe_write()` function\
        \ to ensure no race conditions occur during file operations?\n- What mechanisms\
        \ are in place to prevent unauthorized access to the Chroma vector database\
        \ or to bypass the skill lookup process?\n- How is the system designed to\
        \ scale the `events:stream` Redis stream as the number of concurrent tasks\
        \ and agents increases?\n\n\n---\n\n### infra:infrastructure-setup (docs/deploy/infrastructure_setup.md)\n\
        \n# Infrastructure Setup\n\n## 1. Overview\n\nThe infrastructure setup for\
        \ the Kanpaku system is designed to support secure access, tenant isolation,\
        \ and real-time state management. It integrates `module:auth` and `service:redis`\
        \ to enforce Row-Level Security (RLS) policies, manage authentication tokens,\
        \ and ensure atomic file operations through Redis locking. The setup enables\
        \ compliance with internal and external audit requirements by logging all\
        \ transitions to `/logs/state.log` and Redis streams.\n\nThe infrastructure\
        \ aligns with the defined component dependencies, agent state machine, and\
        \ task flow diagrams. It ensures that all modules and services interact securely,\
        \ with `module:auth` owning shared domain types (`Agent`, `Task`, `Project`,\
        \ `Skill`, `Tenant`) and enforcing RLS policies on database tables (`agents`,\
        \ `tasks`, `projects`, `skills`). Access control is enforced through RBAC\
        \ validation at every access point, and all state changes are logged for auditability.\n\
        \n## 2. Details\n\n### Infrastructure Components\n\n- **Database Layer**:\
        \ The PostgreSQL database schema is configured with tenant isolation using\
        \ RLS policies enforced by `module:auth`. Tables `agents`, `tasks`, `projects`,\
        \ and `skills` are protected by RLS policies that restrict access based on\
        \ tenant ID.\n  \n- **Authentication and Access Control**: \n  - `module:auth`\
        \ validates authentication tokens at all access points.\n  - RBAC controls\
        \ are implemented to validate access to agent states, task flows, and file\
        \ operations.\n  - Role-based access control ensures that only authorized\
        \ agents can transition between states (`IDLE`, `EXECUTING`, `EVOLVING`, `TERMINATED`)\
        \ and perform file operations.\n\n- **Redis Integration**:\n  - Redis is deployed\
        \ with `XADD events:stream` for logging all system events to the `events:stream`\
        \ key.\n  - Redis locking mechanisms are implemented in `service:fileops`\
        \ to ensure atomicity in `safe_write()` operations.\n  - Redis is used for\
        \ real-time state updates and event logging to support agent lifecycle transitions.\n\
        \n- **File Operations**:\n  - The `service:fileops` implements the `safe_write()`\
        \ function with Redis-based locking.\n  - File operations are restricted to\
        \ valid agent states (`EXECUTING`, `EVOLVING`) and occur only within the `/project/`\
        \ directory.\n  - Redis locks are acquired before file write operations and\
        \ released after completion to prevent race conditions.\n\n- **Vector Database\
        \ Integration**:\n  - `service:vector_db` provides an interface for accessing\
        \ the Chroma vector database.\n  - `module:skills` retrieves skill embeddings\
        \ during task execution and stores them in the Chroma database.\n  - All access\
        \ to the Chroma vector database is protected by RBAC and token validation.\n\
        \n- **Logging and Auditing**:\n  - All system transitions are logged to `/logs/state.log`\
        \ for compliance and debugging.\n  - Structured events are streamed to Redis\
        \ for downstream observability.\n  - Audit trails are maintained for all access\
        \ points, state changes, and file operations.\n\n### Compliance and Security\
        \ Controls\n\n- **Tenant Isolation**: RLS policies on database tables ensure\
        \ that data is isolated per tenant.\n- **Access Control**: RBAC validation\
        \ is enforced at every access point to prevent unauthorized access.\n- **Data\
        \ Integrity**: Redis locking in `service:fileops` ensures atomicity and prevents\
        \ race conditions in file operations.\n- **Auditability**: All system events\
        \ are logged to Redis and `/logs/state.log` to support compliance and debugging.\n\
        \n## 3. Open Questions\n\n- How will the Redis stream `events:stream` be monitored\
        \ for performance and throughput?\n- What are the specific SLA thresholds\
        \ for response times when retrieving embeddings from the Chroma vector database?\n\
        - How is the Redis lock timeout configured to avoid deadlocks in high-concurrency\
        \ scenarios?\n- What backup and recovery mechanisms are in place for the PostgreSQL\
        \ database with RLS policies?\n- Are there any specific compliance requirements\
        \ (e.g., GDPR, SOC 2) that dictate how audit logs must be retained or secured?\n\
        \n\n---\n\n### module:system-monitoring (docs/monitor/system_monitoring.md)\n\
        \n# System Monitoring\n\n## 1. Overview\n\nSystem Monitoring for the Kanpaku\
        \ platform is designed to ensure the health, performance, and compliance of\
        \ core infrastructure components, including `module:auth` and `service:redis`.\
        \ This monitoring setup supports tenant isolation, real-time state management,\
        \ and auditability by tracking access control, file operations, and system\
        \ events. It integrates with the existing infrastructure defined in `infra:infrastructure-setup`\
        \ to provide comprehensive visibility into system behavior and potential issues.\n\
        \nMonitoring aligns with the defined component dependencies, agent state machine,\
        \ and task flow diagrams, focusing on ensuring secure access, state consistency,\
        \ and compliance with internal and external audit requirements. The system\
        \ logs all transitions to `/logs/state.log` and Redis streams, enabling real-time\
        \ observability and historical analysis of system behavior.\n\n## 2. Details\n\
        \n### Monitoring Components\n\n- **Database Monitoring**:\n  - PostgreSQL\
        \ database tables (`agents`, `tasks`, `projects`, `skills`) are monitored\
        \ for RLS policy compliance.\n  - Access control is enforced via `module:auth`\
        \ at all access points.\n  - Database queries and access patterns are logged\
        \ for performance and security analysis.\n\n- **Authentication and Access\
        \ Control Monitoring**:\n  - `module:auth` authentication tokens are validated\
        \ at every access point.\n  - RBAC controls are monitored for access to agent\
        \ states, task flows, and file operations.\n  - Role-based access control\
        \ is enforced to restrict transitions between agent states (`IDLE`, `EXECUTING`,\
        \ `EVOLVING`, `TERMINATED`).\n\n- **Redis Monitoring**:\n  - Redis stream\
        \ `events:stream` is monitored for throughput and latency.\n  - Redis locking\
        \ mechanisms in `service:fileops` are tracked to detect potential deadlocks\
        \ or timeouts.\n  - Redis-based state updates and event logging are monitored\
        \ for consistency and performance.\n\n- **File Operations Monitoring**:\n\
        \  - `service:fileops` `safe_write()` operations are monitored for atomicity\
        \ and concurrency.\n  - File operations are restricted to valid agent states\
        \ (`EXECUTING`, `EVOLVING`) and occur only within the `/project/` directory.\n\
        \  - Redis locks are tracked for acquisition and release to ensure no race\
        \ conditions.\n\n- **Vector Database Monitoring**:\n  - `service:vector_db`\
        \ embeddings access is monitored for response times and throughput.\n  - All\
        \ access to the Chroma vector database is protected by RBAC and token validation,\
        \ with access logs maintained.\n\n- **Logging and Auditing Monitoring**:\n\
        \  - System transitions are logged to `/logs/state.log` and Redis streams\
        \ for compliance and debugging.\n  - Structured events are monitored for completeness\
        \ and timeliness.\n  - Audit trails are maintained for all access points,\
        \ state changes, and file operations, with retention policies enforced.\n\n\
        ### Compliance and Security Controls\n\n- **Tenant Isolation Monitoring**:\n\
        \  - RLS policies on database tables are monitored to ensure tenant data isolation.\n\
        \  - Access logs are reviewed for unauthorized access attempts.\n\n- **Access\
        \ Control Monitoring**:\n  - RBAC validation is enforced at every access point,\
        \ with monitoring logs for failed access attempts.\n  - Role assignments and\
        \ permissions are audited regularly.\n\n- **Data Integrity Monitoring**:\n\
        \  - Redis locking in `service:fileops` is monitored to ensure atomicity.\n\
        \  - File write operations are tracked for consistency and concurrency.\n\n\
        - **Auditability Monitoring**:\n  - All system events are logged to Redis\
        \ and `/logs/state.log`.\n  - Logs are retained for at least 90 days and are\
        \ encrypted at rest.\n  - Compliance checks are performed monthly to ensure\
        \ adherence to internal and external audit requirements.\n\n## 3. Open Questions\n\
        \n- How will the Redis stream `events:stream` be monitored for performance\
        \ and throughput?\n- What are the specific SLA thresholds for response times\
        \ when retrieving embeddings from the Chroma vector database?\n- How is the\
        \ Redis lock timeout configured to avoid deadlocks in high-concurrency scenarios?\n\
        - What backup and recovery mechanisms are in place for the PostgreSQL database\
        \ with RLS policies?\n- Are there any specific compliance requirements (e.g.,\
        \ GDPR, SOC 2) that dictate how audit logs must be retained or secured?\n\n\
        \n---\n\n### plan:implementation-plan (docs/plan/implementation_plan.md)\n\
        \n# Kanpaku System Implementation Plan\n\n## Overview\n\nThe Kanpaku system\
        \ is a high-concurrency agent orchestration framework that integrates real-time\
        \ state management with Redis, persistent YAML-based audit trails, and evolutionary\
        \ skill acquisition mechanisms powered by ChromaDB. The architecture is optimized\
        \ for deployment on NVIDIA RTX 2070 SUPER (8GB VRAM) with strict resource\
        \ management requirements for LLM inference and vector embeddings.\n\n## System\
        \ Architecture\n\n### Core Components\n\n1. **Redis**: Primary data store\
        \ for task state and execution logs\n2. **Executors (Toneri, Onmyoji)**: Task\
        \ execution components\n3. **Orchestrator (Tonoben)**: Task flow management\
        \ and data integrity validation\n4. **ChromaDB**: Vector database for skill\
        \ storage and retrieval\n5. **File System**: `/history/` directory for YAML\
        \ task records\n\n### Agent Hierarchy\n\n- **Kanpaku**: Primary user interface\n\
        - **Tonoben**: Orchestrator for task decomposition and management\n- **Toneri**:\
        \ L1-L3 task executors\n- **Onmyoji**: L4-L6 task executors\n\n## Sprint-Based\
        \ Implementation Roadmap\n\n#### Sprint 1（5 days）: Core Infrastructure Setup\n\
        \n**Objective**: Establish foundational architecture and basic state management\n\
        \n| Task ID | Task Name | Module Hint | Deliverables |\n|---------|-----------|-------------|--------------|\n\
        | 1-1 | Redis Schema Deployment | module:executor | Initialize `tasks:{task_id}`\
        \ hash structure, create agent inbox lists, implement distributed locking\
        \ |\n| 1-2 | Agent Base Class Architecture | module:executor | Create base\
        \ class for all agents, define abstract methods, implement heartbeat mechanism\
        \ |\n| 1-3 | Directory Structure and Basic Utilities | module:persistence\
        \ | Define `/history/tasks/` structure, create utility functions, implement\
        \ YAML serialization |\n\n#### Acceptance Criteria\n- Redis connection and\
        \ basic operations functional\n- Agent base class instantiated with heartbeat\
        \ monitoring\n- Directory structure created and basic file operations working\n\
        \n#### Sprint 2（7 days）: State Machine and Task Routing\n\n**Objective**:\
        \ Implement core task execution flow and agent routing logic\n\n| Task ID\
        \ | Task Name | Module Hint | Deliverables |\n|---------|-----------|-------------|--------------|\n\
        | 2-1 | Bloom Classification Routing Implementation | module:Tonoben | Set\
        \ up Tonoben routing for L1-L3/L4-L6 tasks, implement task complexity evaluation\
        \ |\n| 2-2 | Timeout Monitoring Service | module:monitor | Implement timeout\
        \ enforcement, set up automatic reset, configure timeout policies |\n| 2-3\
        \ | Retry and Termination Logic | module:task_manager | Implement retry counters,\
        \ enforce 10-attempt limit, set up exponential backoff |\n\n#### Acceptance\
        \ Criteria\n- Tasks correctly routed based on complexity\n- Timeout monitoring\
        \ and automatic reset functional\n- Retry logic operational with exponential\
        \ backoff\n\n#### Sprint 3（8 days）: Persistence Layer and Data Integrity\n\
        \n**Objective**: Ensure all agent actions are auditable and recoverable\n\n\
        | Task ID | Task Name | Module Hint | Deliverables |\n|---------|-----------|-------------|--------------|\n\
        | 3-1 | YAML Serialization Engine | module:persistence | Complete utility\
        \ development, generate YAML files with schema, implement structured logging\
        \ format |\n| 3-2 | Atomic History Locking | module:persistence | Implement\
        \ locking mechanism, prevent race conditions, ensure atomic file operations\
        \ |\n| 3-3 | Integrity Verification System | module:Tonoben | Build drift\
        \ detection hooks, timestamp comparison, enforce tolerance thresholds |\n\n\
        #### Acceptance Criteria\n- YAML files created with proper structure and sanitization\n\
        - Concurrent access controlled with Redis locks\n- Drift detection operational\
        \ with automatic pipeline stop on failure\n\n#### Sprint 4（9 days）: Performance\
        \ Optimization and Security\n\n**Objective**: Optimize performance and implement\
        \ security measures\n\n| Task ID | Task Name | Module Hint | Deliverables\
        \ |\n|---------|-----------|-------------|--------------|\n| 4-1 | Performance\
        \ Optimization | module:persistence | Optimize YAML serialization, implement\
        \ log truncation, add subdirectory partitioning |\n| 4-2 | Security and Sanitization\
        \ | module:persistence | Implement log cleaner, remove credentials, sanitize\
        \ tool_call entries |\n| 4-3 | LLM Stack Integration | infra:llm-stack | Set\
        \ up inference stack, implement shared embedding RPC, configure model deployment\
        \ |\n\n#### Acceptance Criteria\n- Performance targets met (<200ms serialization/write)\n\
        - All sensitive data properly sanitized\n- LLM stack operational within VRAM\
        \ constraints\n\n#### Sprint 5（7 days）: Skill Evolution and VectorDB Integration\n\
        \n**Objective**: Enable system learning from successful task outcomes\n\n\
        | Task ID | Task Name | Module Hint | Deliverables |\n|---------|-----------|-------------|--------------|\n\
        | 5-1 | Vector Database Setup | db:chroma | Initialize ChromaDB with transformers,\
        \ apply quantization for VRAM limits, implement vector operations |\n| 5-2\
        \ | Skill Registration Pipeline | module:Tonoben | Implement gatekeeper logic,\
        \ filter tasks for promotion, set up score thresholds |\n| 5-3 | Weighted\
        \ Retrieval Logic | module:Tonoben | Develop ranking algorithm, implement\
        \ top-3 skill injection, enforce truncation |\n\n#### Acceptance Criteria\n\
        - ChromaDB operational with quantized models\n- Skill promotion pipeline functional\
        \ with proper filtering\n- Skill retrieval and injection working with weighted\
        \ scoring\n\n#### Sprint 6（6 days）: Testing and Dashboard Integration\n\n\
        **Objective**: Comprehensive testing and operational visibility\n\n| Task\
        \ ID | Task Name | Module Hint | Deliverables |\n|---------|-----------|-------------|--------------|\n\
        | 6-1 | Comprehensive Testing | module:executor | Unit tests for utilities,\
        \ integration tests with agents, load testing for concurrency |\n| 6-2 | Dashboard\
        \ and Monitoring | module:monitor | Failed task visualization, system health\
        \ monitoring, operational metrics |\n| 6-3 | Documentation and Deployment\
        \ | module:kanpaku | Technical documentation, deployment guide, system integration\
        \ |\n\n#### Acceptance Criteria\n- All tests passing with >95% coverage\n\
        - Dashboard operational with real-time metrics\n- Production-ready deployment\
        \ package\n\n## Risk Management\n\n| Risk Category | Description | Mitigation\
        \ Strategy | Sprint Focus |\n|:---|:---|:---|:---|\n| **VRAM Contention**\
        \ | RTX 2070 SUPER (8GB) OOM risk | Shared embedding RPC service; resident\
        \ model manager | Sprint 4 |\n| **System Drift** | Redis-YAML synchronization\
        \ issues | Tonoben drift detection (1000ms threshold); pipeline stop on failure\
        \ | Sprint 3 |\n| **Recursive Failure** | Infinite retry loops | 10-retry\
        \ limit; escalation to Onmyoji for evaluation | Sprint 2 |\n| **Skill Regression**\
        \ | Low-quality pattern retrieval | 0.7/0.3 similarity-success rate ratio;\
        \ 80+ score threshold | Sprint 5 |\n| **File System Bloat** | Directory performance\
        \ degradation | Log truncation; subdirectory partitioning plan | Sprint 4\
        \ |\n\n## Technical Specifications\n\n### Performance Targets\n- YAML serialization/write:\
        \ <200ms\n- Redis operations: <50ms\n- Vector embedding generation: <500ms\n\
        - Concurrent task processing: 100+ tasks\n\n### Resource Constraints\n- VRAM\
        \ usage: <7.5GB (RTX 2070 SUPER)\n- Memory usage: <16GB system RAM\n- Disk\
        \ I/O: <100MB/s (for persistence operations)\n\n### Quality Gates\n- Unit\
        \ test coverage: >95%\n- Integration test success rate: 100%\n- Performance\
        \ benchmarks: All targets met\n- Security scan: No critical vulnerabilities\n\
        \n## Module Dependencies\n\n### Core Modules\n- **module:executor**: File\
        \ execution for sandbox operations (Sprint 1)\n- **module:Tonoben**: Orchestrator\
        \ for task decomposition and management (Sprint 2)\n- **module:kanpaku**:\
        \ Primary user interface (Sprint 1)\n- **module:monitor**: Timeout and heartbeat\
        \ enforcement (Sprint 2)\n- **module:task_manager**: Task lifecycle management\
        \ (Sprint 2)\n- **module:persistence**: YAML persistence for historical records\
        \ (Sprint 3)\n\n### Infrastructure Components\n- **infra:llm-stack**: LLM\
        \ inference configuration (Sprint 4)\n- **infra:deployment**: Model deployment\
        \ and resource allocation (Sprint 4)\n- **db:redis**: Redis state management\
        \ and locking (Sprint 1)\n- **db:chroma**: Vector database for skills (Sprint\
        \ 5)\n\n### Operational Policies\n- **agent:hierarchy**: Agent hierarchy enforcement\
        \ (Sprint 2)\n- **agent:heartbeat**: 30-second interval monitoring (Sprint\
        \ 1)\n- **agent:timeout-policy**: 300s thinking, 120s execution timeout (Sprint\
        \ 2)\n- **redis:file-lock**: File locking mechanism (Sprint 3)\n- **state:persistence**:\
        \ State auditability (Sprint 3)\n- **skill:retrieval-logic**: Success-based\
        \ skill retrieval (Sprint 5)\n- **ops:failure-visibility**: Failed task dashboard\
        \ visibility (Sprint 6)\n- **review:score-threshold**: >=80 completion threshold\
        \ (Sprint 5)\n\n## Unresolved Issues and Future Considerations\n\n1. **Log\
        \ Rotation**: Volume threshold for `/history/tasks/` archive (post-Sprint\
        \ 6)\n2. **Partial Persistence**: Incremental writes for long-running tasks\
        \ (post-Sprint 6)\n3. **Schema Versioning**: YAML schema evolution management\
        \ (post-Sprint 6)\n4. **Validation Metadata**: Encrypted hashes for sandbox\
        \ state (post-Sprint 6)\n5. **Model Swapping**: Dynamic model management for\
        \ VRAM optimization (post-Sprint 6)\n\nThis sprint-based implementation plan\
        \ provides a structured approach to building the Kanpaku system with clear\
        \ milestones, dependencies, and acceptance criteria while maintaining the\
        \ technical depth and comprehensive coverage of the original specification.\n\
        \n\n---\n\n### req:kanpaku-requirements (docs/requirements/requirements.md)\n\
        \n# **Kanpaku( Kanpaku System)**\n## Basic Concepts\n\n### What We Want to\
        \ Achieve\n#### Priority: High\n- AI operates autonomously and in parallel\n\
        - Hierarchical management structure with role-based agents\n- Watch AI operate\
        \ with dramatic performances\n- Prevent interruptions during thinking and\
        \ stuck states (Hook system in Shogun system)\n- Introduce Consistency-Driven\
        \ Development (CoDD)\n- Real-time dashboard updates for project status\n-\
        \ Limit file modification scope (e.g., specific project folders only)\n- Model\
        \ Heian period court instead of Sengoku period\n- Self-improvement through\
        \ autonomous Agent Skills addition\n\n#### Priority: Medium\n- Management\
        \ from Android\n- LoRA-based judgment criteria\n\n### Architecture Overview\n\
        | Shogun System | Kanpaku System | Description | Model Used |\n| --- | ---\
        \ | --- | --- |\n| Emperor | Mikado | - User | - Human |\n| Shogun | Kanpaku\
        \ | - Sole interface with user<br>- Goal setting<br>- Instruction creation\
        \ for Tonoben<br>- Skill creation judgment | - gemma4-26B-A4B |\n| Chief Retainer\
        \ | Tonoben | - Task decomposition from instructions<br>- Assignment of Toneri/Onmyoji<br>-\
        \ Execution result review<br>- Dashboard updates<br>- Agent monitoring<br>-\
        \ Multiple internal processes | - gemma4-E2B |\n| Foot Soldier | Toneri |\
        \ - Handles bloom_level: L1-L3<br>- Parallel execution<br>- File operations\
        \ (sandbox required) | - Bonsai-8B<br>- DeepSeek 6.7B<br>- gemma4-E2B |\n\
        | Military Advisor | Onmyoji | - Handles bloom_level: L4-L6<br>- Thinking\
        \ only (execution prohibited)<br>- Pattern extraction for Skills | - gemma4-26B-A4B\
        \ |\n\n### Routing Criteria\n[Reference: Classifying AI subordinates with\
        \ 70-year-old educational theory, the chief retainer proposed his own demotion\
        \ and framed his successor from day one](https://zenn.dev/shio_shoppaize/articles/shogun-bloom-routing)\n\
        \n| Level | English | Japanese | Cognitive Activity | Example |\n| --- | ---\
        \ | --- | --- | --- |\n| L1 | Remember |  | Search, list | \"Find this file\"\
        \ |\n| L2 | Understand |  | Summarize, explain | \"Explain this code\" |\n\
        | L3 | Apply |  | Create following template | \"Write a README\" |\n| L4 |\
        \ Analyze |  | Examine structure, find causes | \"Why did this bug occur?\"\
        \ |\n| L5 | Evaluate |  | Compare, judge | \"Which is better, A or B?\" |\n\
        | L6 | Create |  | Design, create new | \"Design architecture\" |\n\n### Terminology\n\
        - Agent -> **Official Post**\n- Task -> **Government Affairs**\n- Log -> **Diary**\n\
        - Dashboard (report to user) -> **Memorial to the Throne**\n- Project team\
        \ -> **Administrative Office**\n- Skill -> **Copy**\n\n## System Design\n\n\
        ### Flow Correspondence Table\n- \"-\" indicates no state change\n\n| Event\
        \ | Task: State Change | Agent: State Change | Content |\n| --- | --- | ---\
        \ | --- |\n| (User input) | - | Mikado | Instructions via chat |\n| ORDER_CREATING\
        \ | - | Kanpaku: thinking | Instruction creation start |\n| ORDER_CREATED\
        \ | - | Kanpaku: idle | Instruction creation complete |\n| TASK_CREATING |\
        \ - | Tonoben: thinking | Task creation start |\n| TASK_CREATED | task: created\
        \ | Tonoben: thinking | Task creation complete |\n| TASK_ASSIGNED | task:\
        \ assigned | Tonoben: - | Task assignment |\n| TASK_STARTED | task: doing\
        \ | Toneri/Onmyoji: thinking | Task execution start |\n| TASK_COMPLETED |\
        \ task: reviewing | Toneri/Onmyoji: idle | Task objective achieved |\n| TASK_FAILED\
        \ | task: reviewing | Toneri/Onmyoji: idle | Task requirements not met |\n\
        | TASK_STALLED | task: assigned | Toneri/Onmyoji: error | Timeout<br>retry.count++\
        \ |\n| REVIEW_STARTED | - | Tonoben: working | Review start |\n| REVIEW_APPROVED\
        \ | - | Tonoben: idle | Review approved |\n| REVIEW_REJECTED | task: assigned\
        \ | Tonoben: idle | Review rejected<br>retry.count++ |\n| REVIEW_STALLED |\
        \ task: reviewing | Tonoben: error | Timeout<br>retry.count++ |\n| DASHBOARD_UPDATING\
        \ | - | Tonoben: thinking | Dashboard update start |\n| DASHBOARD_UPDATED\
        \ | task: completed | Tonoben: idle | Dashboard update complete |\n| (User\
        \ confirmation) | - | Mikado | Dashboard confirmation |\n| ANALYZE_CREATING\
        \ | - | Kanpaku: thinking | Analysis start |\n| ANALYZE_CREATED | - | Kanpaku:\
        \ idle | Analysis complete + report |\n\n### Time Model\n- thinking: Long\
        \ is normal (waiting for LLM)\n- doing: Stuck is abnormal (I/O)\n- heartbeat_interval:\
        \ 30 seconds -> Display message like \"Creating letter...\" (spinner-like)\n\
        - Summary\n```yaml\nAgentTimePolicy:\n  thinking:\n    timeout: 300\n  doing:\n\
        \    timeout: 120\n  idle:\n    timeout: null\n```\n\n### Redis Design\n####\
        \ 1. tasks\n- Type: Hash\n- Key: tasks:{task_id}\n- Structure: id, setting,\
        \ assigned, answer, execution, review, retry, timing\n- Status list: created,\
        \ doing, reviewing, completed, failed\n\n#### 2. agents\n- Type: Hash\n- Key:\
        \ agents:{agent_id}\n- Structure: status, current_task, last_heartbeat\n-\
        \ Status list: idle, thinking, working, error, retrying, stopped\n\n#### 3.\
        \ events stream\n- Type: Streams\n- Key: events:stream\n- Stream processing:\
        \ XADD events:stream * type TASK_STARTED task_id T1 agent toneri-1\n\n####\
        \ 4. inbox\n- Type: Streams\n- Key: inbox:{agent_id}\n- Data flow: Event ->\
        \ stream -> Pub/Sub notification -> Agent startup -> Event retrieval -> Processing\n\
        \n#### 5. lock\n- Type: Hash\n- Key: lock:{filepath}\n- Prevent simultaneous\
        \ file operations\n- Lock process: SET lock:file1.md {by: toneri-2} EX 300\
        \ NX\n\n### History Design\n#### Policy\n- Redis = Current state\n- YAML /\
        \ log = Persistent history\n\n#### 1. Task History (YAML)\n- Path: /history/tasks/T1.yaml\n\
        - Structure: task_id, history (status, timestamp)\n\n#### 2. Event History\
        \ (YAML)\n- Path: /history/events/2026-04-09.yaml\n- Structure: event, task_id,\
        \ by, meta, timestamp\n\n#### 3. State History (log)\n- Path: /logs/state.log\n\
        - Structure: [TASK] T1 assigned -> doing, [AGENT] toneri-1 idle -> working\n\
        \n#### 4. Agent History\n- Path: /history/agents/toneri-1.yaml\n- Structure:\
        \ agent_id, history (task, status, duration)\n\n#### 5. Skill Application\
        \ History\n- Path: /logs/skill_accepted.log\n- Structure: task_id, skill_id,\
        \ result\n\n## Function Details\n\n### Skill Self-Evolution\n- Skills are\
        \ \"tendencies\" not \"commands\"\n- Used as prompt assistance\n\n#### Registration\
        \ Flow\n1. TASK_COMPLETED (review: PASS, score >= 80)\n2. ANALYZE_CREATING\
        \ (Kanpaku)\n3. Pattern extraction (Onmyoji)\n4. Skill creation (structuring)\n\
        5. Save to VectorDB\n\n#### Search Flow\n1. TASK_CREATED/REVIEW_REJECTED\n\
        2. Similar task search (priority: success_rate, similarity, usage_count)\n\
        3. Get top 3\n4. Inject into prompt\n5. TASK_ASSIGNED\n\n#### Skill Evolution\
        \ (Self-reinforcement loop)\n- Success: usage_count++, success_rate update\n\
        - Failure: failure_pattern addition, success_rate decrease\n- Periodic processing:\
        \ low-score skill deletion, similar skill integration\n\n#### Skill Data Structure\n\
        - skill_id, name, description, conditions, steps, prompt_template, success_pattern,\
        \ failure_pattern, embedding_text\n\n#### VectorDB\n- Use Chroma\n- Collection:\
        \ skills\n- Structure: id, embedding, metadata, document\n\n### Executor Layer\n\
        - Layer for executing file operations by LLM\n- Implementation: safe_write()\
        \ with sandbox control\n- Sandbox control: restrict to /project/ directory\n\
        \n### UI\n- Developed with Streamlit\n- Layout: Project name, Kanpaku, Memorial\
