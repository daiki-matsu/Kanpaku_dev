        ### test:acceptance-criteria (docs/test/acceptance_criteria.md)\n\n# Acceptance\
        \ Criteria\n\n## 1. Overview\n\nThis document defines the acceptance criteria\
        \ for the Kanpaku system, ensuring that the system meets functional, security,\
        \ and operational requirements as specified in the system design and architecture.\
        \ The Kanpaku system is an AI-driven autonomous management platform with a\
        \ hierarchical structure composed of multiple agents (Mikado, Kanpaku, Tonoben,\
        \ Toneri, Onmyoji) that interact through defined workflows and task routing\
        \ logic. The system must support tenant isolation, role-based access control,\
        \ real-time dashboard updates, and secure file operations within sandboxed\
        \ environments.\n\nThe system is built on Redis for state management and event\
        \ streaming, with YAML-based history tracking and a vector database (Chroma)\
        \ for skill self-evolution. All interactions with the system must be authenticated\
        \ and audited, with strict controls on file modification scope and agent behavior.\n\
        \n## 2. Acceptance Criteria\n\n### Authentication and Authorization\n- All\
        \ API endpoints must require valid authentication tokens.\n- Role-based access\
        \ control (RBAC) must be enforced at the API level.\n- Tenant isolation must\
        \ be implemented using Row-Level Security (RLS) policies on database tables.\n\
        - Access to system resources must be restricted to authenticated users within\
        \ their assigned tenant.\n\n### Task and Agent Management\n- Tasks must be\
        \ created, assigned, and executed according to Bloom level routing rules.\n\
        - Task status transitions must follow the defined flow: created → assigned\
        \ → doing → reviewing → completed/failed.\n- Agent status must reflect its\
        \ current role (idle, thinking, working, error, retrying, stopped).\n- The\
        \ system must support task retry logic with incrementing retry counts on timeout\
        \ or failure.\n- Tasks must be associated with a specific project folder and\
        \ restricted to file operations within that scope.\n\n### Dashboard and Reporting\n\
        - The dashboard (Memorial to the Throne) must display real-time updates of\
        \ task statuses.\n- The dashboard must include sections for urgent issues,\
        \ in-progress tasks, and completed tasks.\n- Users must be able to view detailed\
        \ task information, including agent assignments and status history.\n- Dashboard\
        \ updates must occur upon task completion or review approval.\n\n### Skill\
        \ Self-Evolution\n- Skills must be registered only after successful task completion\
        \ with a score of 80 or higher.\n- Skill creation must involve pattern extraction\
        \ from task outcomes by Onmyoji agents.\n- Skills must be stored in the Chroma\
        \ vector database with embeddings and metadata.\n- The system must search\
        \ for relevant skills during task creation or review rejection and inject\
        \ them into prompts.\n- Skill evolution must update usage counts and success\
        \ rates, and remove low-performing skills periodically.\n\n### File Operations\n\
        - All file operations must be executed via a sandboxed `safe_write()` function.\n\
        - File access must be restricted to the `/project/` directory.\n- Simultaneous\
        \ file operations must be prevented using Redis-based locking (`lock:{filepath}`).\n\
        - File modifications must be logged in the system history.\n\n### Event Streaming\
        \ and Logging\n- All system events must be streamed to Redis using `XADD events:stream`.\n\
        - Agents must retrieve events from their inbox streams (`inbox:{agent_id}`)\
        \ and process them.\n- State changes must be logged in `/logs/state.log` with\
        \ timestamps.\n- Event history must be stored in `/history/events/` as YAML\
        \ files.\n- Task history must be stored in `/history/tasks/` as YAML files.\n\
        \n### Time Model Compliance\n- Agent thinking states must timeout after 300\
        \ seconds.\n- Task doing states must timeout after 120 seconds.\n- Heartbeat\
        \ messages must be sent every 30 seconds during agent activity.\n- UI must\
        \ display spinner-like messages such as \"Creating letter...\" during agent\
        \ thinking.\n\n## 3. Non-Acceptance Criteria\n\n- Unauthorized access to system\
        \ resources or data must be blocked.\n- File operations outside the `/project/`\
        \ directory must be prohibited.\n- Tasks must not be assigned to agents outside\
        \ their Bloom level capability.\n- Skills must not be registered without successful\
        \ task completion.\n- System logs must not contain sensitive information without\
        \ encryption or sanitization.\n- The UI must not expose internal system paths\
        \ or configurations.\n- Redis keys must not be accessible or modifiable by\
        \ unauthorized agents or users.\n- The system must not allow concurrent execution\
        \ of tasks with conflicting file locks.\n\n\n---\n\n## Generated Code Fragments\n\
